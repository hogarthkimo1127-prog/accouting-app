<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>隨手記帳 Web App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col justify-between">
        
        <div class="p-5 flex-1 overflow-y-auto">
            <h1 class="text-2xl font-bold text-gray-800 mb-4">💰 隨手記帳</h1>
            
            <div class="bg-indigo-600 text-white p-5 rounded-2xl mb-6 shadow-md">
                <p class="text-sm opacity-80">本月總支出</p>
                <p class="text-3xl font-extrabold mt-1">NT$ <span id="total-amount">0</span></p>
            </div>

            <h3 class="text-lg font-bold text-gray-700 mb-3">消費明細</h3>
            <ul id="history-list" class="space-y-3">
                </ul>
        </div>

        <div class="bg-gray-50 p-5 border-t border-gray-200 sticky bottom-0">
            <form id="record-form" class="space-y-3">
                <div class="grid grid-cols-3 gap-2">
                    <select id="category" class="col-span-1 p-3 rounded-xl border border-gray-300 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="食">🍔 食</option>
                        <option value="衣">👕 衣</option>
                        <option value="住">🏠 住</option>
                        <option value="行">🚗 行</option>
                        <option value="樂">🎉 樂</option>
                    </select>
                    <input type="number" id="amount" placeholder="金額" inputmode="numeric" required
                        class="col-span-2 p-3 rounded-xl border border-gray-300 text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <input type="text" id="note" placeholder="備註（如：午餐便當）" 
                    class="w-full p-3 rounded-xl border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <button type="submit" 
                    class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold transition hover:bg-indigo-700 active:scale-[0.98]">
                    加入帳目
                </button>
            </form>
        </div>
    </div>

    <script>
        // 1. 初始化資料（嘗試從 LocalStorage 讀取，沒有就給空陣列）
        let records = JSON.parse(localStorage.getItem('records')) || [];

        const form = document.getElementById('record-form');
        const historyList = document.getElementById('history-list');
        const totalAmountEl = document.getElementById('total-amount');

        // 2. 渲染畫面函數
        function render() {
            historyList.innerHTML = '';
            let total = 0;

            // 倒序排列，讓最新的帳目在最上面
            [...records].reverse().forEach((record, index) => {
                total += Number(record.amount);
                
                const li = document.createElement('li');
                li.className = 'flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100';
                li.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <span class="bg-gray-100 p-2 rounded-lg text-lg">${record.category}</span>
                        <div>
                            <p class="font-semibold text-gray-800">${record.note || record.category}</p>
                            <p class="text-xs text-gray-400">${record.date}</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-3">
                        <span class="font-bold text-red-500">-$${record.amount}</span>
                        <button onclick="deleteRecord(${records.length - 1 - index})" class="text-gray-300 hover:text-red-500 text-sm">✕</button>
                    </div>
                `;
                historyList.appendChild(li);
            });

            totalAmountEl.innerText = total.toLocaleString();
            localStorage.setItem('records', JSON.stringify(records));
        }

        // 3. 新增帳目事件
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const newRecord = {
                category: document.getElementById('category').value,
                amount: document.getElementById('amount').value,
                note: document.getElementById('note').value,
                date: new Date().toLocaleDateString('zh-TW')
            };

            records.push(newRecord);
            render();
            
            // 清空輸入框
            document.getElementById('amount').value = '';
            document.getElementById('note').value = '';
        });

        // 4. 刪除帳目
        function deleteRecord(index) {
            records.splice(index, 1);
            render();
        }

        // 初始執行
        render();
    </script>
</body>
</html>
