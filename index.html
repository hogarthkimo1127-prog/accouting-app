<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雲端隨手記帳（支援 CSV 匯出）</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col justify-between">
        
        <div id="login-section" class="p-5 flex flex-col items-center justify-center flex-1 space-y-4">
            <h1 class="text-3xl font-bold text-gray-800">💰 雲端隨手記帳</h1>
            <p class="text-gray-500 text-center">支援手機與電腦即時雲端同步</p>
            <button id="btn-login" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold mt-4 shadow-md hover:bg-indigo-700">
                使用 Google 帳號登入
            </button>
        </div>

        <div id="main-section" class="hidden flex-1 flex flex-col justify-between min-h-screen">
            <div class="p-5 flex-1 overflow-y-auto">
                <div class="flex justify-between items-center mb-4">
                    <h1 class="text-2xl font-bold text-gray-800">💰 雲端隨手記帳</h1>
                    <button id="btn-logout" class="text-sm text-gray-400 hover:text-red-500">登出</button>
                </div>
                
                <div class="bg-indigo-600 text-white p-5 rounded-2xl mb-6 shadow-md">
                    <p class="text-sm opacity-80">本月總支出</p>
                    <p class="text-3xl font-extrabold mt-1">NT$ <span id="total-amount">0</span></p>
                </div>

                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-lg font-bold text-gray-700">消費明細</h3>
                    <button id="btn-export" class="text-sm bg-green-600 text-white px-3 py-1.5 rounded-xl hover:bg-green-700 font-bold shadow-sm transition active:scale-95">
                        📊 匯出 CSV
                    </button>
                </div>

                <ul id="history-list" class="space-y-3">
                    </ul>
            </div>

            <div class="bg-gray-50 p-5 border-t border-gray-200 sticky bottom-0">
                <form id="record-form" class="space-y-3">
                    <div class="grid grid-cols-3 gap-2">
                        <select id="category" class="col-span-1 p-3 rounded-xl border border-gray-300 bg-white text-sm focus:outline-none">
                            <option value="食">🍔 食</option>
                            <option value="衣">👕 衣</option>
                            <option value="住">🏠 住</option>
                            <option value="行">🚗 行</option>
                            <option value="樂">🎉 樂</option>
                        </select>
                        <input type="number" id="amount" placeholder="金額" inputmode="numeric" required class="col-span-2 p-3 rounded-xl border border-gray-300 text-lg focus:outline-none">
                    </div>
                    <input type="text" id="note" placeholder="備註（如：午餐便當）" class="w-full p-3 rounded-xl border border-gray-300 text-sm focus:outline-none">
                    <button type="submit" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold">加入雲端帳目</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ 請在此處替換為你專屬的 Firebase Config 金鑰！
  const firebaseConfig = {
    apiKey: "AIzaSyCmUw5oI8ZdwtKWl7NHLuxb4hZO_rD29rU",
    authDomain: "my-accounting-cloud-6769a.firebaseapp.com",
    projectId: "my-accounting-cloud-6769a",
    storageBucket: "my-accounting-cloud-6769a.firebasestorage.app",
    messagingSenderId: "674426063763",
    appId: "1:674426063763:web:bbc64ce9dc9243f8847666",
    measurementId: "G-NGVCDHS6JW"
  };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // 建立全域變數，用來即時儲存從雲端下載的資料，方便 CSV 匯出功能使用
        window.currentRecords = []; 
        let currentUser = null;
        let unsubscribeTimeline = null;

        // DOM 元素
        const loginSection = document.getElementById('login-section');
        const mainSection = document.getElementById('main-section');
        const btnLogin = document.getElementById('btn-login');
        const btnLogout = document.getElementById('btn-logout');
        const btnExport = document.getElementById('btn-export');
        const form = document.getElementById('record-form');
        const historyList = document.getElementById('history-list');
        const totalAmountEl = document.getElementById('total-amount');

        // 監聽登入狀態
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loginSection.classList.add('hidden');
                mainSection.classList.remove('hidden');
                startListeningRecords(user.uid);
            } else {
                currentUser = null;
                loginSection.classList.remove('hidden');
                mainSection.classList.add('hidden');
                if (unsubscribeTimeline) unsubscribeTimeline();
            }
        });

        btnLogin.addEventListener('click', () => signInWithPopup(auth, provider));
        btnLogout.addEventListener('click', () => signOut(auth));

        // 即時監聽雲端資料庫
        function startListeningRecords(uid) {
            const q = query(collection(db, "accounting_records"), where("uid", "==", uid), orderBy("createdAt", "desc"));
            
            unsubscribeTimeline = onSnapshot(q, (snapshot) => {
                historyList.innerHTML = '';
                let total = 0;
                window.currentRecords = []; // 每次雲端有變動，先清空舊的快取

                snapshot.forEach((doc) => {
                    const record = doc.data();
                    total += Number(record.amount);
                    
                    // 把每一筆資料存進快取陣列中（同時附帶一個雲端的 docId，日後可能有用）
                    window.currentRecords.push({ id: doc.id, ...record });

                    const li = document.createElement('li');
                    li.className = 'flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100';
                    li.innerHTML = `
                        <div class="flex items-center space-x-3">
                            <span class="bg-gray-100 p-2 rounded-lg text-lg">${record.category}</span>
                            <div>
                                <p class="font-semibold text-gray-800">${record.note || record.category}</p>
                                <p class="text-xs text-gray-400">${record.date}</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-3">
                            <span class="font-bold text-red-500">-$${record.amount}</span>
                            <button class="btn-delete text-gray-300 hover:text-red-500 text-sm" data-id="${doc.id}">✕</button>
                        </div>
                    `;
                    historyList.appendChild(li);
                });

                totalAmountEl.innerText = total.toLocaleString();

                // 綁定刪除事件
                document.querySelectorAll('.btn-delete').forEach(button => {
                    button.addEventListener('click', async (e) => {
                        const id = e.target.getAttribute('data-id');
                        await deleteDoc(doc(db, "accounting_records", id));
                    });
                });
            });
        }

        // 新增帳目到雲端
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const amountInput = document.getElementById('amount');
            const noteInput = document.getElementById('note');

            await addDoc(collection(db, "accounting_records"), {
                uid: currentUser.uid,
                category: document.getElementById('category').value,
                amount: amountInput.value,
                note: noteInput.value,
                date: new Date().toLocaleDateString('zh-TW'),
                createdAt: new Date().getTime()
            });

            amountInput.value = '';
            noteInput.value = '';
        });

        // 📊 點擊按鈕匯出 CSV 檔案的邏輯
        btnExport.addEventListener('click', () => {
            if (window.currentRecords.length === 0) {
                alert('目前雲端沒有任何記帳資料可以匯出！');
                return;
            }

            // 1. 為了防止 Excel 開啟時繁體中文變成亂碼，必須加上BOM開頭 "\uFEFF"
            let csvContent = "\uFEFF"; 
            csvContent += "日期,分類,金額,備註\n";

            // 2. 雲端監聽預設是「由新到舊」，匯出成 CSV 時轉回「由舊到新」比較符合統計軟體的習慣
            const exportData = [...window.currentRecords].reverse();

            exportData.forEach(record => {
                // 清除備註可能包含的英文逗號（,），避免弄亂 CSV 的欄位切分
                const cleanNote = record.note ? record.note.replace(/,/g, " ") : "";
                
                // 組裝成一列 CSV 資料
                const row = `"${record.date}","${record.category}",${record.amount},"${cleanNote}"`;
                csvContent += row + "\n";
            });

            // 3. 虛擬建立一個下載連結，觸發瀏覽器下載檔案
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            
            // 檔名會自動帶上今天的日期
            const today = new Date().toISOString().split('T')[0];
            link.setAttribute("href", url);
            link.setAttribute("download", `我的帳目備份_${today}.csv`);
            
            document.body.appendChild(link);
            link.click(); // 模擬點擊
            document.body.removeChild(link); // 用完刪除連結
        });
    </script>
</body>
</html>
